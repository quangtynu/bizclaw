<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizClaw — Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/dashboard/styles.css">
<!--
  IMPORTANT: We import preact core and hooks from a SINGLE bundled URL.
  Using separate esm.sh URLs for preact and preact/hooks creates the
  "dual-package hazard" where hooks register with a different Preact
  options singleton than the renderer, causing useState/setPage to
  silently fail to trigger re-renders.

  Solution: Use esm.sh ?bundle mode to inline all dependencies.
-->
<script type="importmap">
{
  "imports": {
    "preact": "https://esm.sh/preact@10.25.4/es2022/preact.mjs",
    "preact/hooks": "https://esm.sh/preact@10.25.4/es2022/hooks.mjs",
    "htm": "https://esm.sh/htm@3.1.1?bundle"
  }
}
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
// Preact + HTM — React-like components, no build step (3KB + 700B)
// Import from the EXACT same module URLs as the importmap to guarantee
// a single Preact instance. The hooks module's internal
// `import { options } from "./preact.mjs"` resolves to the same file.
import { h, render, Component, createContext } from 'preact';
import { useState, useEffect, useContext, useCallback, useRef, useMemo } from 'preact/hooks';
import htm from 'htm';
const html = htm.bind(h);

// Make available globally for page modules (app.js uses window.* destructuring)
window.h = h; window.html = html; window.render = render;
window.useState = useState; window.useEffect = useEffect;
window.useContext = useContext; window.useCallback = useCallback;
window.useRef = useRef; window.useMemo = useMemo;
window.createContext = createContext;

// Load app module
const { App } = await import('/static/dashboard/app.js');
render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
